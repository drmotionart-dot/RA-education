name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Run collision regression test
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc -b

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    if: false
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Seed database
        run: node seed/run.js
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/ra-education-test
          JWT_SECRET: ci-test-secret-key

      - name: Start backend
        run: node api/index.js &
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/ra-education-test
          JWT_SECRET: ci-test-secret-key
          PORT: 3000

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Wait for backend
        run: npx wait-on http://localhost:3000/api/health

      - name: Start frontend
        run: npx vite --port 5173 &
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000/api

      - name: Wait for frontend
        run: npx wait-on http://127.0.0.1:5173

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000/api
